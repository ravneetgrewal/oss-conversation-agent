<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conversation Agent</title>
    <link rel="stylesheet" href="/styles.css?v=20260515-ui2">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="rail-mark" aria-hidden="true">
          <svg viewBox="0 0 40 40">
            <circle cx="20" cy="20" r="17"/>
            <path d="M13.5 21.5c0-4.2 3-7.1 7.2-7.1 2.9 0 5.3 1.4 6.6 3.6"/>
            <path d="M26.5 18.5c0 4.2-3 7.1-7.2 7.1-2.9 0-5.3-1.4-6.6-3.6"/>
            <path d="M15.5 27.8 12.5 22l5.9.8"/>
            <path d="m24.5 12.2 3 5.8-5.9-.8"/>
            <circle cx="20" cy="20" r="2.6"/>
          </svg>
        </div>
        <button id="new-chat" class="rail-button" type="button" title="New chat" aria-label="New chat">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
        <div class="history-drawer">
          <label class="search-wrap">
            <span class="visually-hidden">Search conversations</span>
            <input id="conversation-search" placeholder="Search chats" autocomplete="off">
          </label>
          <nav id="conversation-list" class="conversation-list" aria-label="Conversations"></nav>
        </div>
        <div class="rail-spacer"></div>
        <div class="profile-dot" aria-hidden="true">RG</div>
      </aside>

      <main class="chat-shell empty">
        <header class="topbar">
          <div class="title-block">
            <input id="conversation-title" class="title-input" aria-label="Conversation title" disabled>
            <div id="connection-state" class="connection-state"></div>
          </div>
          <div class="topbar-actions">
            <button id="memory-toggle" class="ghost-button" type="button">Memory</button>
            <button id="regenerate" class="ghost-button" type="button">Retry</button>
            <button id="delete-chat" class="round-button" type="button" title="Archive conversation" aria-label="Archive conversation">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="m19 6-1 14H6L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/></svg>
            </button>
          </div>
        </header>

        <section id="messages" class="messages" aria-live="polite"></section>

        <aside id="memory-panel" class="memory-panel" hidden>
          <div class="memory-panel-header">
            <div>
              <h2>Chat Memory</h2>
              <p id="memory-stats"></p>
            </div>
            <button id="memory-close" class="round-button" type="button" title="Close memory" aria-label="Close memory">x</button>
          </div>
          <label class="memory-enabled-row">
            <input id="memory-enabled" type="checkbox">
            <span>Enabled</span>
          </label>
          <label class="memory-field">
            <span>Summary</span>
            <textarea id="memory-summary" rows="6"></textarea>
          </label>
          <label class="memory-field">
            <span>Facts and Preferences</span>
            <textarea id="memory-facts" rows="5"></textarea>
          </label>
          <label class="memory-field">
            <span>Decisions and Requirements</span>
            <textarea id="memory-decisions" rows="5"></textarea>
          </label>
          <label class="memory-field">
            <span>Open Questions</span>
            <textarea id="memory-questions" rows="4"></textarea>
          </label>
          <div class="memory-actions">
            <button id="memory-save" class="primary-button" type="button">Save</button>
          </div>
        </aside>

        <form id="composer" class="composer">
          <div id="attachment-list" class="attachment-list"></div>
          <div class="composer-row">
            <button id="attach-button" class="round-button composer-icon" type="button" title="Attach file" aria-label="Attach file">+</button>
            <input id="file-input" type="file" multiple hidden>
            <textarea id="message-input" rows="1" placeholder="Ask anything" autocomplete="off"></textarea>
            <div class="model-picker" id="model-picker">
              <button id="model-picker-button" class="model-picker-button" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="model-picker-label">Model</span>
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
              </button>
              <div id="model-picker-menu" class="model-picker-menu" role="listbox" hidden></div>
              <select id="model-select" aria-label="Model"></select>
            </div>
            <button id="stop-button" class="ghost-button" type="button" hidden>Stop</button>
            <button id="send-button" class="voice-send-button" type="submit" title="Send" aria-label="Send">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4Z"/></svg>
            </button>
          </div>
        </form>
      </main>
    </div>
    <script type="module" src="/app.js?v=20260515-ui2"></script>
  </body>
</html>
